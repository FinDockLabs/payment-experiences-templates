<template>
    <div class="amount-frequency-container">

        <!-- Frequency Toggle -->
        <fieldset class="frequency-toggle">
            <legend class="slds-assistive-text">Donation frequency</legend>

            <input
                type="radio"
                id={frequencyOnceId}
                name={frequencyGroupName}
                value="oneTime"
                class="visually-hidden-input"
                checked={isGiveOnce}
                onchange={handleFrequencyChange}
            />
            <label for={frequencyOnceId} class="toggle-option">Give once</label>

            <input
                type="radio"
                id={frequencyMonthlyId}
                name={frequencyGroupName}
                value="recurring"
                class="visually-hidden-input"
                checked={isMonthly}
                onchange={handleFrequencyChange}
            />
            <label for={frequencyMonthlyId} class="toggle-option toggle-option-monthly">
                <lightning-icon
                    icon-name="utility:heart"
                    size="x-small"
                    class="monthly-icon"
                    aria-hidden="true"
                ></lightning-icon>
                Monthly
            </label>
        </fieldset>

        <!-- Preset Amount Buttons -->
        <fieldset class="amount-grid">
            <legend class="slds-assistive-text">Select a preset donation amount</legend>
            <template for:each={presetAmountOptions} for:item="option">
                <span key={option.value} class="amount-cell">
                    <input
                        type="radio"
                        id={option.inputId}
                        name={presetName}
                        value={option.value}
                        class="visually-hidden-input"
                        checked={option.isSelected}
                        onchange={handlePresetAmountSelect}
                    />
                    <label for={option.inputId} class="amount-option">{option.label}</label>
                </span>
            </template>
        </fieldset>

        <!-- Custom Amount Input -->
        <lightning-input
            type="number"
            label="Other amount"
            variant="label-hidden"
            placeholder="Other amount"
            value={_customAmount}
            min="0"
            step="any"
            class="custom-amount-input"
            onchange={handleCustomAmountChange}
        ></lightning-input>

    </div>
</template>
